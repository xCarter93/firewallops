packages:
  - "packages/*"
  - "harness"

# pnpm 11 build-script approval (renamed from onlyBuiltDependencies; the
# package.json `pnpm` field is no longer read). esbuild + msgpackr-extract ship
# prebuilt binaries and are approved to run their install scripts (esbuild is
# Vite's bundler).
#
# The four `false` entries are CLIENT-side (Vite-bundled) or OPTIONAL native
# transitive deps pulled in by @clerk/clerk-js — none need their build/postinstall
# to function:
#   - bufferutil / utf-8-validate: OPTIONAL native ws accelerators. The browser
#     uses native WebSocket, so the pure-JS fallback is fine.
#   - core-js: postinstall is only a funding message — nothing to build.
#   - browser-tabs-lock: clerk's pure-JS cross-tab session lock — no native build.
allowBuilds:
  esbuild: true
  msgpackr-extract: true
  browser-tabs-lock: false
  bufferutil: false
  core-js: false
  utf-8-validate: false

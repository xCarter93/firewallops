<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FirewallOps</title>
    <!--
      Web fonts (Meshed System, Phase 6): Orbitron {500-900} display/headings/CTA,
      Saira {300-600} body/running-text, Aldrich alt-headings (lobby room title),
      Saira Condensed {500-700} dense tags, Share Tech Mono {400} numeric/data. The
      shell DOM pages use these; BootScene (plan 09, /play only) awaits
      `document.fonts.ready` before the first canvas frame (no FOUT, Pitfall 5).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Aldrich&family=Saira:wght@300;400;500;600&family=Saira+Condensed:wght@500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        /* The shell pages own their own scroll; the canvas (on /play only) fills
           the viewport (Scale.RESIZE). overflow:hidden here prevents a canvas
           descender gap / sub-pixel rounding from making the page scrollable and
           pushing the bottom HUD bar below the fold while a match is mounted. The
           DOM pages scroll inside #app when their content exceeds the viewport. */
        overflow: hidden;
        background: #0f172a;
      }
      /* The shell mount root. The mini-router (src/shell/router.ts) swaps page
         DOM into here. The play page (plan 09) injects its own #game-container
         under #app on /play and removes it on leave — there is NO static canvas
         container so the lobby/landing DOM and a live canvas never coexist. */
      #app {
        width: 100vw;
        height: 100vh;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FirewallOps</title>
    <!--
      Web fonts (UI-SPEC "Tech/HUD Mono" pairing): Share Tech Mono + Fira Code,
      with Orbitron reserved for the win banner. Zero-dependency CSS-link path
      (RESEARCH A3) — BootScene awaits `document.fonts.ready` before handoff so
      the first canvas frame renders in the correct family (no FOUT, Pitfall 5).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Fira+Code:wght@400;500&family=Orbitron:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        /* The canvas fills the viewport (Scale.RESIZE); hide overflow so a
           canvas descender gap / sub-pixel rounding can never make the page
           scrollable and push the bottom HUD bar below the fold. */
        overflow: hidden;
        background: #0f172a;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
      }
      /* A canvas is display:inline by default and sits on the text baseline,
         leaving a few px of descender space beneath it — block removes it. */
      #game-container canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
